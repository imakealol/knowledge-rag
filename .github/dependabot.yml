version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    reviewers:
      - "lyonzin"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    reviewers:
      - "lyonzin"
    labels:
      - "ci"
      - "dependencies"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/npm"
    schedule:
      interval: "monthly"
    reviewers:
      - "lyonzin"
    labels:
      - "dependencies"
      - "npm"
    open-pull-requests-limit: 3
    groups:
      npm-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    reviewers:
      - "lyonzin"
    labels:
      - "docker"
      - "dependencies"
    open-pull-requests-limit: 2
