name: Security

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC

permissions:
  security-events: write
  contents: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install pip-audit
          pip install -r requirements.txt
          pip-audit || true
      - name: Audit summary
        run: pip-audit --format=json | python -c "import sys,json; d=json.load(sys.stdin); vulns=d.get('vulnerabilities',[]); print(f'Found {len(vulns)} vulnerabilities'); [print(f'  {v[\"name\"]} {v[\"version\"]}: {v[\"id\"]}') for v in vulns]" || true
